<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashChat - Live Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">

    <style>
        /* ==========================================================
           CHAT PAGE — same design tokens/components as the dashboard
        ========================================================== */

        .chat-page {
            width: min(1450px, 95%);
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 2.7fr;
            gap: 30px;
            height: calc(100vh - 155px);
            min-height: 560px;
        }

        /* ---------- Sidebar ---------- */
        .chat-sidebar {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        .sidebar-section h3 {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #userCountBadge {
            background: var(--primary);
            color: white;
            font-size: 12px;
            padding: 2px 9px;
            border-radius: 999px;
            font-weight: 700;
            min-width: 22px;
            text-align: center;
        }

        #usersListContainer {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 220px;
            overflow-y: auto;
        }

        #usersListContainer button {
            text-align: left;
            background: var(--surface-light);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
        }

        #usersListContainer button:hover {
            background: var(--primary);
        }

        /* ---------- Stranger card (mirrors dashboard's .stranger-card) ---------- */
        .stranger-mini {
            background: linear-gradient(135deg, var(--primary), #4338CA);
            border-radius: var(--radius);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stranger-mini p {
            font-size: 13px;
            opacity: .9;
            margin: 0;
        }

        .input_field {
            width: 100%;
            border: none;
            outline: none;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, .15);
            color: white;
        }

        .input_field option {
            color: var(--text);
        }

        .button_add {
            border: none;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            padding: 12px 18px;
            font-weight: 600;
            width: 100%;
        }

        #findStrangerBtn {
            background: white;
            color: var(--primary);
        }

        #findStrangerBtn:hover {
            transform: translateY(-2px);
        }

        #leaveStrangerBtn {
            background: var(--danger);
            color: white;
        }

        #skipStrangerBtn {
            background: var(--warning);
            color: #1a1a1a;
        }

        /* ---------- Room list ---------- */
        #chatRooms {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .roomBtn {
            text-align: left;
            background: var(--surface-light);
            color: white;
            border: none;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
        }

        .roomBtn:hover {
            background: var(--primary);
        }

        /* ---------- Friend requests / friends (mirrors dashboard's .friend-item) ---------- */
        #friendRequestsContainer,
        #friendsListContainer {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 180px;
            overflow-y: auto;
        }

        #friendRequestsContainer>div {
            background: var(--surface-light) !important;
            border-radius: var(--radius-sm);
            padding: 12px !important;
            font-size: 14px;
        }

        #friendRequestsContainer button {
            border: none;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            margin-right: 8px;
            margin-top: 8px;
        }

        .acceptBtn {
            background: var(--success);
            color: white;
        }

        .rejectBtn {
            background: var(--danger);
            color: white;
        }

        #friendsListContainer button {
            width: 100%;
            text-align: left;
            background: var(--surface-light);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
        }

        #friendsListContainer button:hover {
            background: var(--primary);
        }

        .add-friend-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #friendSearchInput {
            padding: 12px 14px;
        }

        #addFriendBtn {
            background: var(--primary);
            color: white;
        }

        #addFriendBtn:hover {
            background: var(--primary-dark);
        }

        hr {
            border: none;
            border-top: 1px solid var(--border);
        }

        /* ---------- Chat panel ---------- */
        .chat-panel {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 25px;
            background: rgba(15, 23, 42, .35);
            border-bottom: 1px solid var(--border);
        }

        .back-btn {
            background: var(--surface-light);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
        }

        .back-btn:hover {
            background: var(--primary);
        }

        #roomTitleHeading {
            flex: 1;
            font-size: 18px;
            font-weight: 600;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--danger);
            box-shadow: 0 0 10px var(--danger);
            transition: var(--transition);
        }

        .status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .messages-box {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 60%;
            padding: 10px 16px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.system {
            align-self: center;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            font-style: italic;
        }

        .my-message {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            max-width: 60%;
            padding: 10px 16px;
            border-radius: 14px 14px 2px 14px;
            font-size: 14px;
            line-height: 1.4;
        }

        .other-message {
            align-self: flex-start;
            background: var(--surface-light);
            color: white;
            max-width: 60%;
            padding: 10px 16px;
            border-radius: 14px 14px 14px 2px;
            font-size: 14px;
            line-height: 1.4;
        }

        .input-area {
            display: flex;
            gap: 12px;
            padding: 20px 25px;
            background: rgba(15, 23, 42, .35);
            border-top: 1px solid var(--border);
        }

        .input-area input {
            flex: 1;
        }

        #sendBtn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 26px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        #sendBtn:hover {
            background: var(--primary-dark);
        }

        @media(max-width:1000px) {
            .chat-page {
                grid-template-columns: 1fr;
                height: auto;
            }

            .chat-panel {
                height: 70vh;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER — identical to dashboard's header -->
    <header class="header">
        <div class="logo">⚡ FlashChat</div>
        <div class="header-right">
            <div class="status-dot" id="statusDot" title="Connection status"></div>
        </div>
    </header>

    <main class="chat-page">

        <!-- SIDEBAR -->
        <aside class="chat-sidebar">

            <div class="sidebar-section">
                <h3><span>Online Users</span><span id="userCountBadge">0</span></h3>
                <div id="usersListContainer"></div>
            </div>

            <div class="stranger-mini">
                <div>
                    <strong>🎲 Stranger Chat</strong>
                    <p>Meet someone new, instantly.</p>
                </div>
                <button id="findStrangerBtn" class="button_add">
                    <span class="btn-txt">Find a Stranger</span>
                </button>
                <select id="interestSelect" class="input_field">
                    <option value="">Random Stranger</option>
                    <option value="Programming">Programming</option>
                    <option value="Gaming">Gaming</option>
                    <option value="Movies">Movies</option>
                    <option value="Music">Music</option>
                    <option value="Sports">Sports</option>
                    <option value="Books">Books</option>
                    <option value="AI">Artificial Intelligence</option>
                </select>
                <button id="leaveStrangerBtn" class="button_add" style="display:none;">Leave Stranger</button>
                <button id="skipStrangerBtn" class="button_add" style="display:none;">
                    <span class="btn-txt">Skip Stranger</span>
                </button>
            </div>

            <hr>

            <div class="sidebar-section">
                <h3>Chat Rooms</h3>
                <div id="chatRooms">
                    <button class="roomBtn" data-room="Programming">Programming</button>
                    <button class="roomBtn" data-room="Gaming">Gaming</button>
                    <button class="roomBtn" data-room="Movies">Movies</button>
                    <button class="roomBtn" data-room="Music">Music</button>
                    <button class="roomBtn" data-room="Sports">Sports</button>
                    <button class="roomBtn" data-room="AI">AI</button>
                </div>
            </div>

            <hr>

            <div class="sidebar-section">
                <h3>Friend Requests</h3>
                <div id="friendRequestsContainer"></div>
            </div>

            <hr>

            <div class="sidebar-section">
                <h3>Friends</h3>
                <div id="friendsListContainer"></div>
            </div>

            <div class="add-friend-row">
                <input id="friendSearchInput" class="input_field" placeholder="Username">
                <div id="searchResult"></div>
                <button id="addFriendBtn" class="button_add">
                    <span class="btn-txt">Add Friend</span>
                </button>
            </div>
        </aside>

        <!-- CHAT PANEL -->
        <section class="chat-panel">
            <div class="chat-header">
                <button id="backBtn" class="back-btn">← Exit Room</button>
                <h2 id="roomTitleHeading">Global Public Room</h2>
            </div>

            <div id="messagesBox" class="messages-box"></div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
                <button id="sendBtn">Send</button>
            </div>
        </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/state.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/chatroom.js"></script>
    <script src="/js/friends.js"></script>
    <script src="/js/stranger.js"></script>
    <script src="/js/socketEvents.js"></script>
    <script src="/js/chat.js"></script>

</body>

</html>
